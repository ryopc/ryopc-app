name: Build Android App

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Web Directory (Required for Capacitor)
        run: |
          mkdir -p www
          cat > www/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>ryopc app</title>
          </head>
          <body>
            <h1>Hello World</h1>
          </body>
          </html>
          EOF

      - name: Initialize Capacitor
        run: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            npx cap init "ryopc app" "com.ryopc.app" --web-dir=www
          else
            echo "Capacitor already initialized"
          fi

      - name: Add Android Platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "Android platform already exists"
          fi

      - name: Sync Code
        run: npx cap sync android

      - name: Set App Icon Safely
        run: |
          if [ ! -f icon.png ]; then
            echo "icon.png not found, creating a safe dummy png via Node.js"
            node -e "
              const fs = require('fs');
              const buf = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=', 'base64');
              fs.writeFileSync('icon.png', buf);
            "
          fi

          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Grant Execute Permission for Gradlew
        run: chmod +x android/gradlew

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Rename APK File Safely
        run: |
          APK_DIR="android/app/build/outputs/apk/debug"
          APK_FILE="$(find "$APK_DIR" -maxdepth 1 -name "*.apk" | head -n 1)"
          if [ -n "$APK_FILE" ]; then
            mv "$APK_FILE" "$APK_DIR/ryopc-app.apk"
          else
            echo "APK not found"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryopc-app
          path: android/app/build/outputs/apk/debug/ryopc-app.apk
