name: Build Android App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Install Dependencies
      run: |
        npm install @capacitor/core @capacitor/cli
        npm install @capacitor/android

    - name: Create Web Directory (Required for Capacitor)
      run: |
        mkdir -p www
        echo '<!DOCTYPE html><html><head><title>ryopc app</title></head><body><h1>Hello World</h1></body></html>' > www/index.html

    - name: Initialize Capacitor
      run: npx cap init "ryopc app" "com.ryopc.app" --web-dir=www

    - name: Add Android Platform
      run: npx cap add android

    - name: Set App Icon Safely
      run: |
        # アイコン画像が存在しない場合のフォールバック（検証用プレースホルダー）
        if [ ! -f icon.png ]; then
          echo "icon.png not found, creating a dummy one"
          convert -size 512x512 xc:blue icon.png || touch icon.png
        fi
        
        # ディレクトリを作成してアイコンをコピー
        mkdir -p android/app/src/main/res/mipmap-mdpi
        mkdir -p android/app/src/main/res/mipmap-hdpi
        mkdir -p android/app/src/main/res/mipmap-xhdpi
        mkdir -p android/app/src/main/res/mipmap-xxhdpi
        mkdir -p android/app/src/main/res/mipmap-xxxhdpi
        
        cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
        cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
        cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
        cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
        cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
        cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
        cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

    - name: Sync Code
      run: npx cap sync

    - name: Grant Execute Permission for Gradlew
      run: chmod +x android/gradlew

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Rename APK File
      run: |
        mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/ryopc-app.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ryopc-app
        path: android/app/build/outputs/apk/debug/ryopc-app.apk
