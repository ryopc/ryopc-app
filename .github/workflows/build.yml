name: Build Android App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Install Dependencies
      run: |
        npm install @capacitor/core @capacitor/cli
        npm install @capacitor/android

    - name: Create Web Directory (Required for Capacitor)
      run: |
        mkdir -p www
        echo '<!DOCTYPE html><html><head><title>ryopc app</title></head><body><h1>Hello World</h1></body></html>' > www/index.html

    - name: Initialize Capacitor
      run: npx cap init "ryopc app" "com.ryopc.app" --web-dir=www

    - name: Add Android Platform
      run: npx cap add android

    - name: Fix Duplicate Kotlin Standard Library Conflict
      run: |
        # 【最重要】一番大元のビルド設定ファイルに、競合を解決する設定を強制的に書き込みます
        ROOT_GRADLE="android/build.gradle"
        if [ -f "$ROOT_GRADLE" ]; then
          echo "Applying Kotlin-stdlib conflict fix to $ROOT_GRADLE"
          cat << 'EOF' >> $ROOT_GRADLE

          subprojects {
              subprojects {
                  configurations.all {
                      resolutionStrategy {
                          exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
                          exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
                      }
                  }
              }
          }
        EOF
        else
          echo "Warning: $ROOT_GRADLE not found."
        fi

    - name: Set App Icon Safely
      run: |
        if [ ! -f icon.png ]; then
          echo "icon.png not found, creating a safe dummy png via Node.js"
          node -e "
            const fs = require('fs');
            const buf = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=', 'base64');
            fs.writeFileSync('icon.png', buf);
          "
        fi
        
        mkdir -p android/app/src/main/res/mipmap-mdpi
        mkdir -p android/app/src/main/res/mipmap-hdpi
        mkdir -p android/app/src/main/res/mipmap-xhdpi
        mkdir -p android/app/src/main/res/mipmap-xxhdpi
        mkdir -p android/app/src/main/res/mipmap-xxxhdpi
        
        cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
        cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
        cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
        cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
        cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
        cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
        cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

    - name: Sync Code
      run: npx cap sync

    - name: Grant Execute Permission for Gradlew
      run: chmod +x android/gradlew

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Rename APK File Safely
      run: |
        APK_DIR="android/app/build/outputs/apk/debug"
        if [ -f "$APK_DIR/app-debug.apk" ]; then
          mv "$APK_DIR/app-debug.apk" "$APK_DIR/ryopc-app.apk"
        else
          echo "Warning: app-debug.apk not found, searching for any debug apk..."
          find "$APK_DIR" -name "*.apk" -exec mv {} "$APK_DIR/ryopc-app.apk" \;
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ryopc-app
        path: android/app/build/outputs/apk/debug/ryopc-app.apk
