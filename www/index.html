<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ryopc Dashboard</title>

<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="components/loader.css" />

  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
</head>
<body>

  <!-- ローダー -->
  <div id="loader" class="loader-overlay">
    <div class="loader-spinner"></div>
    <p class="loader-text">読み込み中…</p>
  </div>

  <!-- ヘッダー -->
  <header class="dash-header">
    <span class="brand">ryopc Dashboard</span>
  </header>

  <!-- ダッシュボード本体 -->
  <main class="dashboard">
<!-- [お問い合わせフォーム] -->
        <section class="card" id="contact">
            <h2 data-t="contact_title">Contact Us</h2>
            <p data-t="contact_body" style="color: var(--text-light); margin-bottom: 2rem;">プロジェクトに関するご質問やご相談は、以下のフォームよりお気軽にお問い合わせください。</p>
            
            <form action="https://form-api.ryopc.f5.si" method="POST" id="contactForm">
                
                <input type="hidden" name="_redirect" value="https://ryopc.f5.si">

                <div class="form-group">
                    <label for="form_name" data-t="label_name">Name</label>
                    <input type="text" id="form_name" name="お名前" required placeholder="Your Name" class="form-control">
                </div>

                <div class="form-group">
                    <label for="form_email" data-t="label_email">Email Address</label>
                    <input type="email" id="form_email" name="メールアドレス" required placeholder="your.email@example.com" class="form-control">
                </div>

                <div class="form-group">
                    <label for="form_subject" data-t="label_subject">Subject</label>
                    <select id="form_subject" name="ご用件" class="form-control">
                        <option value="一般のお問い合わせ" data-t="opt_general">General Inquiry</option>
                        <option value="プロジェクトへの参加" data-t="opt_project">Join the Project</option>
                        <option value="その他" data-t="opt_other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="form_message" data-t="label_message">Message</label>
                    <textarea id="form_message" name="お問い合わせ内容" required placeholder="Type your message here..." rows="6" class="form-control"></textarea>
                </div>

                <button type="submit" class="form-submit-btn">
                    <span data-t="btn_submit">Send Message</span> <span>➔</span>
                </button>
            </form>
        </section>
<div id="special-mobile-chat-container">
        <button id="special-mobile-chat-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-top: 1px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <span data-t="chat_btn">Chat Support</span>
        </button>
        <span id="special-mobile-close-btn">×</span>
    </div>


      <!-- ローダー制御 -->
  <script src="components/loader.js"></script>

  <!-- ダッシュボード制御 -->
  <script src="css/dashboard.js"></script>
  <!-- ChannelTalk -->
  <script>
(function() {
    var w = window; if (w.ChannelIO) return;
    var ch = function() { ch.c(arguments); }; ch.q = []; ch.c = function(args) { ch.q.push(args); }; w.ChannelIO = ch;
    function l() {
        if (w.ChannelIOInitialized) return; w.ChannelIOInitialized = true;
        var s = document.createElement('script'); s.type = 'text/javascript'; s.async = true; s.src = 'https://cdn.channel.io/plugin/ch-plugin-web.js';
        var x = document.getElementsByTagName('script')[0]; x.parentNode.insertBefore(s, x);
    }
    if (document.readyState === 'complete') l(); else { w.addEventListener('load', l); }
})();

// ページ読み込み完了時に自動でチャットを初期化
window.addEventListener('load', function() {
    chInitTalk();
});

function chInitTalk() {
    ChannelIO('boot', { "pluginKey": 'f06bb3b5-5394-4b24-b902-03d4110cfddd' }, () => initMobileChatButton());
}

function initMobileChatButton() {
    const container = document.getElementById('special-mobile-chat-container');
    if (container) {
        container.style.display = 'block';
        ChannelIO('hideChannelButton');
        document.getElementById('special-mobile-chat-btn').onclick = () => ChannelIO('showMessenger');
        document.getElementById('special-mobile-close-btn').onclick = (e) => { e.stopPropagation(); container.style.display = 'none'; };
    }
}
  </script>

</body>
</html>
